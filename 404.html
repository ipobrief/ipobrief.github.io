<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #0a0e17;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
.wrap { max-width: 400px; }
.code { font-size: 72px; font-weight: 800; color: #1e2a40; letter-spacing: 4px; }
.title { font-size: 20px; font-weight: 700; color: #fff; margin-top: 12px; }
.desc { font-size: 14px; color: #64748b; margin-top: 14px; line-height: 1.7; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="title">페이지를 찾을 수 없습니다</div>
    <div class="desc">
      요청하신 페이지가 존재하지 않거나<br>
      주소가 올바르지 않습니다.<br><br>
      공유받은 정확한 링크로 다시 접속해 주세요.
    </div>
  </div>
</body>
</html>
